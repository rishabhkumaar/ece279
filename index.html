<!DOCTYPE html>

<html>
<head>
  <title>ESP Dashboard</title>

  <!-- Chart.js -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px;
      border-radius: 12px;
      display: inline-block;
      width: 220px;
    }

    .value {
      font-size: 32px;
      color: #22c55e;
    }

    canvas {
      max-width: 90%;
      margin-top: 20px;
    }
  </style>

</head>

<body>

<h1>🔥 IoT Sensor Dashboard</h1>

<div class="card">
  <h2>MQ135</h2>
  <div id="mq" class="value">--</div>
</div>

<div class="card">
  <h2>Temperature</h2>
  <div id="temp" class="value">-- °C</div>
</div>

<div class="card">
  <h2>Humidity</h2>
  <div id="hum" class="value">-- %</div>
</div>

<h2>📊 Charts</h2>

<canvas id="tempChart"></canvas> <canvas id="humChart"></canvas>

<script>
const URL = "https://eyfhlcmdhpewovrbixdh.supabase.co/rest/v1/sensor_data?select=*&order=created_at.desc&limit=20";
const API_KEY = "sb_publishable_JXV4aeRf6k51VyrfMPwNvA_SqibyY3n";

let tempChart = new Chart(document.getElementById("tempChart"), {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'Temp °C', data: [] }] }
});

let humChart = new Chart(document.getElementById("humChart"), {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'Humidity %', data: [] }] }
});

async function loadData() {
  const res = await fetch(URL, {
    headers: {
      apikey: API_KEY
    }
  });

  const data = await res.json();

  if (!data.length) return;

  data.reverse();

  let labels = [];
  let temps = [];
  let hums = [];

  data.forEach(row => {
    labels.push(new Date(row.created_at).toLocaleTimeString());
    temps.push(row.temperature);
    hums.push(row.humidity);
  });

  let latest = data[data.length - 1];

  document.getElementById("mq").innerText = latest.mq135;
  document.getElementById("temp").innerText = latest.temperature + " °C";
  document.getElementById("hum").innerText = latest.humidity + " %";

  tempChart.data.labels = labels;
  tempChart.data.datasets[0].data = temps;
  tempChart.update();

  humChart.data.labels = labels;
  humChart.data.datasets[0].data = hums;
  humChart.update();
}

// refresh every 3 sec
setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
