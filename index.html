<!DOCTYPE html>

<html>
<head>
  <title>ESP Pro Dashboard</title>

  <!-- Supabase -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Chart.js -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .value {
      font-size: 34px;
      color: #22c55e;
    }

    canvas {
      max-width: 90%;
      margin: 20px auto;
    }

    .alert {
      background: red;
      padding: 10px;
      margin: 10px;
      display: none;
      font-weight: bold;
    }
  </style>

</head>

<body>

<h1>🔥 IoT Sensor Dashboard</h1>

<div id="alertBox" class="alert">⚠️ GAS LEVEL HIGH!</div>

<div class="container">
  <div class="card">
    <h2>MQ135</h2>
    <div id="mq" class="value">--</div>
  </div>

  <div class="card">
    <h2>Temperature</h2>
    <div id="temp" class="value">-- °C</div>
  </div>

  <div class="card">
    <h2>Humidity</h2>
    <div id="hum" class="value">-- %</div>
  </div>
</div>

<h2>📊 Live Charts</h2>

<canvas id="tempChart"></canvas> <canvas id="humChart"></canvas>

<script>
const supabase = window.supabase.createClient(
  "https://eyfhlcmdhpewovrbixdh.supabase.co",
  "sb_publishable_JXV4aeRf6k51VyrfMPwNvA_SqibyY3n"
);

// Charts
let tempChart = new Chart(document.getElementById("tempChart"), {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'Temp °C', data: [] }] }
});

let humChart = new Chart(document.getElementById("humChart"), {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'Humidity %', data: [] }] }
});

// Load latest 20 records
async function loadData() {
  const { data } = await supabase
    .from("sensor_data")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(20);

  if (!data) return;

  data.reverse();

  let labels = [];
  let temps = [];
  let hums = [];

  data.forEach(row => {
    labels.push(new Date(row.created_at).toLocaleTimeString());
    temps.push(row.temperature);
    hums.push(row.humidity);
  });

  let latest = data[data.length - 1];

  // Update UI
  document.getElementById("mq").innerText = latest.mq135;
  document.getElementById("temp").innerText = latest.temperature + " °C";
  document.getElementById("hum").innerText = latest.humidity + " %";

  // Alert system
  if (latest.mq135 > 200) {
    document.getElementById("alertBox").style.display = "block";
  } else {
    document.getElementById("alertBox").style.display = "none";
  }

  // Update charts
  tempChart.data.labels = labels;
  tempChart.data.datasets[0].data = temps;
  tempChart.update();

  humChart.data.labels = labels;
  humChart.data.datasets[0].data = hums;
  humChart.update();
}

// 🔴 REAL-TIME (no refresh)
supabase
  .channel('realtime')
  .on(
    'postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'sensor_data' },
    payload => {
      console.log("New Data:", payload.new);
      loadData();
    }
  )
  .subscribe();

// Initial load
loadData();
</script>

</body>
</html>
